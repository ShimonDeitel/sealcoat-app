name: Sealcoat
options:
  bundleIdPrefix: com.shimondeitel.sealcoat
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Sealcoat:
    type: application
    platform: iOS
    sources:
      - path: Sealcoat
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.sealcoat
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Sealcoat/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  SealcoatTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SealcoatTests
      - path: Sealcoat.storekit
    dependencies:
      - target: Sealcoat
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.sealcoat.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  SealcoatUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: SealcoatUITests
    dependencies:
      - target: Sealcoat
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.sealcoat.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Sealcoat:
    build:
      targets:
        Sealcoat: all
        SealcoatTests: [test]
        SealcoatUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Sealcoat.storekit
    test:
      config: Debug
      storeKitConfiguration: Sealcoat.storekit
      targets:
        - SealcoatTests
        - SealcoatUITests
    archive:
      config: Release
